<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Services | Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Left Panel -->
        <div class="left-panel">
            <div class="left-overlay">
                <img src="https://imgs.search.brave.com/RjjYrXNw0HBrqQIPsKh_NvsmzKtVTgMR1ySVuRS7KSQ/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9pbWcu/bWFnbmlmaWMuY29t/L3ByZW1pdW0tcGhv/dG8vc3RhY2stY2xl/YW4tY2xvdGhlcy1s/eWluZy10YWJsZS1s/YXVuZHJ5LXJvb20t/d2l0aC13YXNoaW5n/LW1hY2hpbmVfOTcy/MDcxLTQzODAuanBn/P2dhPUdBMS4xLjIy/NTkxMTQwNy4xNzgy/MjQ1MzE3JnNlbXQ9/YWlzX2h5YnJpZCZ3/PTc0MCZxPTgw" alt="Laundry Image">
                <h2>Fresh & Clean</h2>
                <p>Premium Laundry Services</p>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="right-content">
                <h1>Welcome Back!</h1>
                <p class="subtitle">Sign in to manage your laundry orders</p>

                <div class="input-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" class="input-box" placeholder="Enter your username">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-box" placeholder="Enter your password">
                </div>

                <div class="button-container">
                    <a href="#" class="btn btn-primary">Sign In</a>
                </div>

                <div class="links">
                    <a href="#">Forgot Password?</a>
                </div>

                <div class="social-login">
                    <a href="#" class="btn social-btn google">Login with Google</a>
                    <a href="#" class="btn social-btn facebook">Login with Facebook</a>
                </div>

                <div class="links" style="margin-top: 30px;">
                    Don't have an account? 
                    <a href="#" class="create-account">Create an account</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
